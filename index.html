const STORAGE_KEY = "kakeibo:v2";

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const yen = (n) => (n < 0 ? "−¥" + Math.abs(Math.round(n)).toLocaleString("ja-JP") : "¥" + Math.round(n).toLocaleString("ja-JP"));
const man = (n) => (Math.abs(n) >= 10000 ? (n / 10000).toFixed(0) + "万" : Math.round(n).toLocaleString());
const today = () => new Date().toISOString().slice(0, 10);
const monthOf = (d) => (d || "").slice(0, 7);
const thisMonth = () => monthOf(today());

// カードの次回支払日を求める（締め月の利用分が payMonth ヶ月後の payDay に引き落とし）
// シンプルに「今月利用分 → payMonth ヶ月後の payDay」として次回予定日を返す
const nextPayDate = (card, baseMonth) => {
  if (!card.payMonth || !card.payDay) return null;
  const [y, m] = baseMonth.split("-").map(Number);
  const total = (m - 1) + card.payMonth;
  const py = y + Math.floor(total / 12);
  const pm = (total % 12) + 1;
  const day = String(card.payDay).padStart(2, "0");
  return `${py}-${String(pm).padStart(2, "0")}-${day}`;
};

// 請求期間（締め日 = closingDate）に対応する実際の引き落とし日を返す。
// 締め日の属する月から payMonth ヶ月後の payDay（月末超過は月末に丸め）。
const payDateForClosing = (card, closingDate) => {
  const pm = card.payMonth || 1;
  const pd = card.payDay || 27;
  const [y, m] = closingDate.split("-").map(Number); // m: 1始まり
  const totalIdx = (y * 12 + (m - 1)) + pm;
  const ey = Math.floor(totalIdx / 12);
  const em = (totalIdx % 12) + 1;
  const lastDay = new Date(ey, em, 0).getDate();
  const d = Math.min(pd, lastDay);
  return `${ey}-${String(em).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
};

// 指定年月の締め日を実日付に丸める（closingDay が末日超過なら月末に）
const addDays = (dateStr, n) => {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
};

const closingDateOf = (y, m, closingDay) => {
  const lastDay = new Date(y, m, 0).getDate(); // m は1始まり
  const d = Math.min(closingDay || 31, lastDay);
  return `${y}-${String(m).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
};

// 締め日サイクルに基づく現在の請求期間 [from, to] を返す（基準日 ref を含む請求期間）
// 「直近の締め日の翌日 〜 次の締め日」を現在進行中の請求期間とする。
const billingCycle = (card, refDate) => {
  const ref = new Date(refDate + "T00:00:00");
  const cd = card.closingDay || 31;
  let y = ref.getFullYear();
  let m = ref.getMonth() + 1; // 1始まり
  const thisClosing = closingDateOf(y, m, cd);
  let from, to;
  if (refDate <= thisClosing) {
    const pm = m === 1 ? 12 : m - 1;
    const py = m === 1 ? y - 1 : y;
    const prevClosing = closingDateOf(py, pm, cd);
    from = addDays(prevClosing, 1);
    to = thisClosing;
  } else {
    const nm = m === 12 ? 1 : m + 1;
    const ny = m === 12 ? y + 1 : y;
    from = addDays(thisClosing, 1);
    to = closingDateOf(ny, nm, cd);
  }
  return { from, to };
};

// 現在の請求期間を基準（offset=0）に、offsetヶ月ずらした請求期間を返す。
// 締め日(to)を月単位で動かし、from = 前月締め日の翌日 として隙間なく連続させる。
const billingCycleByOffset = (card, offset) => {
  const base = billingCycle(card, today()); // 今期の {from, to}
  const cd = card.closingDay || 31;
  // 今期の締め日(to)の年月を取得し、そこから offset ヶ月ずらす
  const [ty, tm] = base.to.split("-").map(Number); // tm: 1始まり
  const totalIdx = (ty * 12 + (tm - 1)) + offset;  // 月の通し番号
  const ey = Math.floor(totalIdx / 12);
  const em = (totalIdx % 12) + 1;
  const toDate = closingDateOf(ey, em, cd);
  // from = 1つ前の締め日の翌日
  const pIdx = totalIdx - 1;
  const py = Math.floor(pIdx / 12);
  const pm = (pIdx % 12) + 1;
  const fromDate = addDays(closingDateOf(py, pm, cd), 1);
  return { from: fromDate, to: toDate };
};

// 期間内のカード利用累計（利用のみ。引き落としは含めない）を自己/立替で集計
const cardUsageInRange = (cardId, entries, from, to) => {
  let self = 0, advance = 0;
  for (const e of entries) {
    if (e.credit !== cardId) continue;
    if (from && e.date < from) continue;
    if (to && e.date > to) continue;
    if (e.debit === ADV) advance += e.amount;
    else self += e.amount;
  }
  return { self, advance, total: self + advance };
};

// 勘定残高（通常残高方向で正）
const balanceOf = (acc, totals) => {
  const t = totals[acc.id] || { d: 0, c: 0 };
  return CAT_MAP[acc.type].normal === "debit" ? t.d - t.c : t.c - t.d;
};

// カードの未払残高を自己利用分・立替分に分けて集計
// 利用（貸方=カード）のうち借方が立替金なら立替分、それ以外は自己分。
// 支払い（借方=カード）は未払を減らす（自己分から優先的に充当）。
const cardBreakdown = (cardId, entries, filter) => {
  let self = 0, advance = 0, paid = 0;
  for (const e of entries) {
    if (filter && !filter(e)) continue;
    if (e.credit === cardId) {
      if (e.debit === ADV) advance += e.amount;
      else self += e.amount;
    } else if (e.debit === cardId) {
      paid += e.amount; // 引き落とし等
    }
  }
  // 支払いは自己分→立替分の順に充当
  let s = self, a = advance, p = paid;
  const fromSelf = Math.min(s, p); s -= fromSelf; p -= fromSelf;
  const fromAdv = Math.min(a, p); a -= fromAdv;
  return { self: s, advance: a, total: s + a, usedSelf: self, usedAdvance: advance, paid };
};

// ---------- 本体 ----------
function Kakeibo() {
  const [accounts, setAccounts] = useState(DEFAULT_ACCOUNTS);
  const [entries, setEntries] = useState([]);
  const [templates, setTemplates] = useState(DEFAULT_TEMPLATES);
  const [budgets, setBudgets] = useState({});
  const [fixed, setFixed] = useState([]);
  const [tab, setTab] = useState("journal");
  const [month, setMonth] = useState(thisMonth());
  const [loaded, setLoaded] = useState(false);
  const [saveState, setSaveState] = useState("");
  const [history, setHistory] = useState([]); // 直前の状態スナップショット（アンドゥー用）
  const [future, setFuture] = useState([]);   // 取り消した状態（リドゥー用）
  const [lastAction, setLastAction] = useState("");

  // 読み込み（v1からの移行込み）
  useEffect(() => {
    (async () => {
      let data = null;
      try {
        const res = localStorage.getItem(STORAGE_KEY);
        if (res) data = JSON.parse(res);
      } catch (e) { /* 初回 */ }
      if (!data) {
        try {
          const old = localStorage.getItem(OLD_KEY);
          if (old) {
            const v1 = JSON.parse(old);
            data = { accounts: null, entries: v1.entries || [] };
          }
        } catch (e) { /* v1なし */ }
      }
      if (data) {
        if (Array.isArray(data.accounts)) setAccounts(data.accounts);
        if (Array.isArray(data.entries)) setEntries(data.entries);
        if (Array.isArray(data.templates)) setTemplates(data.templates);
        if (data.budgets) setBudgets(data.budgets);
        if (Array.isArray(data.fixed)) setFixed(data.fixed);
      }
      setLoaded(true);
    })();
  }, []);

  // 保存
  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try {
        setSaveState("保存中…");
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ accounts, entries, templates, budgets, fixed }));
        setSaveState("保存済み");
      } catch (e) {
        setSaveState("保存できませんでした");
      }
    })();
  }, [accounts, entries, templates, budgets, fixed, loaded]);

  const accMap = useMemo(() => Object.fromEntries(accounts.map((a) => [a.id, a])), [accounts]);
  const months = useMemo(() => {
    const s = new Set(entries.map((e) => monthOf(e.date)).filter(Boolean));
    s.add(thisMonth());
    return [...s].sort().reverse();
  }, [entries]);

  // 年のリスト（記帳が増えれば自動で増える。現在の年も必ず含む）
  const years = useMemo(() => {
    const s = new Set(entries.map((e) => (e.date || "").slice(0, 4)).filter(Boolean));
    s.add(thisMonth().slice(0, 4));
    return [...s].sort().reverse();
  }, [entries]);

  // month の値: "all"（全期間） / "2026"（年） / "2026-06"（月）
  const matchPeriod = (d, m) => {
    if (m === "all") return true;
    if (m.length === 4) return (d || "").slice(0, 4) === m;   // 年指定
    return monthOf(d) === m;                                  // 月指定
  };
  const matchUpTo = (d, m) => {
    if (m === "all") return true;
    if (m.length === 4) return (d || "").slice(0, 4) <= m;    // その年末まで
    return monthOf(d) <= m;
  };
  const inMonth = (e) => matchPeriod(e.date, month);
  const upToMonth = (e) => matchUpTo(e.date, month);

  const totals = (filter) => {
    const t = {};
    for (const e of entries) {
      if (!filter(e)) continue;
      t[e.debit] = t[e.debit] || { d: 0, c: 0 };
      t[e.credit] = t[e.credit] || { d: 0, c: 0 };
      t[e.debit].d += e.amount;
      t[e.credit].c += e.amount;
    }
    return t;
  };

  // 変更前のスナップショットを履歴に積む（最大30件）。新しい操作なのでリドゥー履歴は破棄。
  const pushHistory = (label) => {
    setHistory((h) => [...h.slice(-29), { entries, accounts, label }]);
    setFuture([]);
    setLastAction(label);
  };

  const undo = () => {
    setHistory((h) => {
      if (h.length === 0) return h;
      const prev = h[h.length - 1];
      // 現在の状態をリドゥー用に退避
      setFuture((f) => [...f.slice(-29), { entries, accounts, label: prev.label }]);
      setEntries(prev.entries);
      setAccounts(prev.accounts);
      setLastAction("");
      return h.slice(0, -1);
    });
  };

  const redo = () => {
    setFuture((f) => {
      if (f.length === 0) return f;
      const next = f[f.length - 1];
      // 現在の状態をアンドゥー用に戻す
      setHistory((h) => [...h.slice(-29), { entries, accounts, label: next.label }]);
      setEntries(next.entries);
      setAccounts(next.accounts);
      setLastAction(next.label);
      return f.slice(0, -1);
    });
  };

  const addEntry = (entry) => { pushHistory("記帳"); setEntries((p) => [...p, entry]); };
  const addEntries = (list) => { pushHistory("インポート"); setEntries((p) => [...p, ...list]); };
  const deleteEntry = (id) => { pushHistory("仕訳の削除"); setEntries((p) => p.filter((e) => e.id !== id)); };
  const settleAdvance = (advanceEntry, depositAccId) => {
    pushHistory("立替の精算");
    const settle = {
      id: uid(), date: today(), debit: depositAccId, credit: ADV,
      amount: advanceEntry.amount, memo: `立替精算: ${advanceEntry.memo || ""}`.trim(),
      settleOf: advanceEntry.id,
    };
    setEntries((p) => p.map((e) => (e.id === advanceEntry.id ? { ...e, settled: true } : e)).concat(settle));
  };

  // 科目の変更を履歴付きで行うためのラッパー（並び替え・追加・削除・改名・時価切替など）
  const commitAccounts = (updater, label) => {
    pushHistory(label || "科目の変更");
    setAccounts(updater);
  };

  // インポートの全置き換え用（entries を直接差し替える）
  const replaceEntries = (list) => { pushHistory("インポート（置き換え）"); setEntries(list); };

  const TABS = [
    ["journal", "仕訳帳"], ["assets", "資産"], ["cards", "カード"], ["advance", "立替"],
    ["budget", "予算"], ["reports", "帳票"], ["accounts", "科目"], ["io", "入出力"],
  ];

  // 予算・固定費が使う対象月。年や全期間が選ばれているときは今月を使う
  const targetMonth = (month === "all" || month.length === 4) ? thisMonth() : month;

  return (
    <div className="min-h-screen" style={{ background: PAPER, color: INK }}>
      <header className="px-5 pt-6 pb-4 border-b-2" style={{ borderColor: INK }}>
        <div className="flex items-end justify-between max-w-3xl mx-auto">
          <div>
            <p className="text-xs tracking-widest" style={{ color: MUTE }}>複式簿記 家計帳</p>
            <h1 className="text-2xl mt-1" style={{ fontFamily: MINCHO, fontWeight: 600 }}>Kakei Ledgr</h1>
          </div>
          <div className="flex flex-col items-end gap-1.5">
            {/* 戻る・進む ＋ 期間選択（横並び） */}
            <div className="flex items-center gap-2">
              <button onClick={undo} disabled={history.length === 0}
                aria-label="元に戻す"
                className="p-0.5 transition-opacity"
                style={{ opacity: history.length === 0 ? 0.25 : 1, cursor: history.length === 0 ? "default" : "pointer" }}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                  stroke="#3B82F6" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="9 14 4 9 9 4" />
                  <path d="M4 9h11a5 5 0 0 1 5 5v0a5 5 0 0 1-5 5H9" />
                </svg>
              </button>
              <button onClick={redo} disabled={future.length === 0}
                aria-label="進める"
                className="p-0.5 transition-opacity"
                style={{ opacity: future.length === 0 ? 0.25 : 1, cursor: future.length === 0 ? "default" : "pointer" }}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                  stroke="#3B82F6" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="15 14 20 9 15 4" />
                  <path d="M20 9H9a5 5 0 0 0-5 5v0a5 5 0 0 0 5 5h6" />
                </svg>
              </button>
              <select value={month} onChange={(ev) => setMonth(ev.target.value)}
                className="text-sm bg-transparent border rounded px-2 py-1" style={{ borderColor: RULE }}>
                <option value="all">全期間</option>
                <optgroup label="年で見る">
                  {years.map((y) => <option key={"y" + y} value={y}>{y}年</option>)}
                </optgroup>
                <optgroup label="月で見る">
                  {months.map((m) => <option key={m} value={m}>{m.replace("-", "年")}月</option>)}
                </optgroup>
              </select>
            </div>
            <p className="text-xs" style={{ color: MUTE }}>{saveState}</p>
          </div>
        </div>
      </header>

      <nav className="flex gap-1 px-3 overflow-x-auto border-b max-w-3xl mx-auto" style={{ borderColor: RULE }}>
        {TABS.map(([k, label]) => (
          <button key={k} onClick={() => setTab(k)}
            className="px-3.5 py-3 text-sm whitespace-nowrap border-b-2 -mb-px"
            style={{
              fontFamily: MINCHO,
              borderColor: tab === k ? SHU : "transparent",
              color: tab === k ? INK : MUTE,
              fontWeight: tab === k ? 600 : 400,
            }}>
            {label}
          </button>
        ))}
      </nav>

      <main className="max-w-3xl mx-auto px-4 py-5 pb-16">
        {!loaded ? (
          <p className="text-center py-10 text-sm" style={{ color: MUTE }}>帳簿を開いています…</p>
        ) : tab === "journal" ? (
          <JournalTab accounts={accounts} accMap={accMap} entries={entries.filter(inMonth)}
            templates={templates} setTemplates={setTemplates} onAdd={addEntry} onDelete={deleteEntry} />
        ) : tab === "assets" ? (
          <AssetsTab accounts={accounts} setAccounts={setAccounts} accMap={accMap}
            entries={entries} totals={totals(upToMonth)} onAdd={addEntry} month={month}
            onSnapshot={pushHistory} />
        ) : tab === "cards" ? (
          <CardsTab accounts={accounts} setAccounts={setAccounts} accMap={accMap}
            entries={entries} onAdd={addEntry} onDelete={deleteEntry} onSnapshot={pushHistory} />
        ) : tab === "advance" ? (
          <AdvanceTab accounts={accounts} accMap={accMap} entries={entries} onSettle={settleAdvance} />
        ) : tab === "budget" ? (
          <BudgetTab accounts={accounts} accMap={accMap} totals={totals(inMonth)}
            budgets={budgets} setBudgets={setBudgets} fixed={fixed} setFixed={setFixed}
            entries={entries} onAdd={addEntry} targetMonth={targetMonth} />
        ) : tab === "reports" ? (
          <ReportsTab accounts={accounts} accMap={accMap}
            plTotals={totals(inMonth)} bsTotals={totals(upToMonth)}
            entries={entries.filter(upToMonth)} month={month} />
        ) : tab === "io" ? (
          <IoTab accounts={accounts} accMap={accMap} entries={entries}
            onReplace={replaceEntries} onAddMany={addEntries} />
        ) : (
          <AccountsTab accounts={accounts} setAccounts={setAccounts} entries={entries}
            onSnapshot={pushHistory} />
        )}
      </main>
    </div>
  );
}

// ---------- 共通: 科目セレクト ----------
function AccountSelect({ accounts, value, onChange, filterTypes }) {
  return (
    <select value={value} onChange={(ev) => onChange(ev.target.value)}
      className="w-full bg-white border rounded px-2 py-2 text-sm" style={{ borderColor: RULE }}>
      {CATEGORIES.filter((c) => !filterTypes || filterTypes.includes(c.key)).map((c) => (
        <optgroup key={c.key} label={c.label}>
          {accounts.filter((a) => a.type === c.key).map((a) => (
            <option key={a.id} value={a.id}>{a.name}</option>
          ))}
        </optgroup>
      ))}
    </select>

}

// ---------- 仕訳帳 ----------
function JournalTab({ accounts, accMap, entries, templates, setTemplates, onAdd, onDelete }) {
  const [date, setDate] = useState(today());
  const [debit, setDebit] = useState("food");
  const [credit, setCredit] = useState("cash");
  const [amount, setAmount] = useState("");
  const [memo, setMemo] = useState("");
  const [error, setError] = useState("");
  const [editTpl, setEditTpl] = useState(false);
  // 絞り込み・並べ替え
  const [filterAcc, setFilterAcc] = useState("all"); // 科目ID or "all"
  const [keyword, setKeyword] = useState("");
  const [sortKey, setSortKey] = useState("date_desc"); // date_desc | date_asc | amount_desc | amount_asc
  const [showFilter, setShowFilter] = useState(false);
  const [confirmDel, setConfirmDel] = useState(null); // 削除確認中の仕訳ID

  const applyTemplate = (t) => {
    setDebit(t.debit); setCredit(t.credit);
    if (t.memo) setMemo(t.memo);
    setError("");
  };

  const saveTemplate = () => {
    const dn = accMap[debit]?.name ?? "?";
    const cn = accMap[credit]?.name ?? "?";
    const label = memo.trim() || `${dn}／${cn}`;
    setTemplates((p) => [...p, { id: uid(), label, debit, credit, memo: memo.trim() }]);
  };

  const submit = () => {
    const n = Number(amount);
    if (!date) return setError("日付を入力してください");
    if (!n || n <= 0) return setError("金額は1円以上を入力してください");
    if (debit === credit) return setError("借方と貸方には別の科目を選んでください");
    onAdd({ id: uid(), date, debit, credit, amount: n, memo: memo.trim() });
    setAmount(""); setMemo(""); setError("");
  };

  // 絞り込み（科目・キーワード）→ 並べ替え
  const kw = keyword.trim().toLowerCase();
  const filtered = entries.filter((e) => {
    if (filterAcc !== "all" && e.debit !== filterAcc && e.credit !== filterAcc) return false;
    if (kw) {
      const hay = `${e.memo || ""} ${accMap[e.debit]?.name || ""} ${accMap[e.credit]?.name || ""}`.toLowerCase();
      if (!hay.includes(kw)) return false;
    }
    return true;
  });
  const sorted = [...filtered].sort((a, b) => {
    if (sortKey === "date_asc") return a.date < b.date ? -1 : a.date > b.date ? 1 : 0;
    if (sortKey === "amount_desc") return b.amount - a.amount;
    if (sortKey === "amount_asc") return a.amount - b.amount;
    return a.date < b.date ? 1 : a.date > b.date ? -1 : 0; // date_desc
  });
  const filterActive = filterAcc !== "all" || kw !== "";
  const filteredTotal = filtered.reduce((s, e) => s + e.amount, 0);

  return (
    <div>
      {/* テンプレート */}
      <div className="flex flex-wrap gap-1.5 mb-3 items-center">
        {templates.map((t) => (
          <span key={t.id} className="inline-flex items-center">
            <button onClick={() => (editTpl ? null : applyTemplate(t))}
              className="text-xs px-2.5 py-1.5 rounded-full border bg-white"
              style={{ borderColor: RULE, color: INK }}>
              {t.label}
            </button>
            {editTpl && (
              <button onClick={() => setTemplates((p) => p.filter((x) => x.id !== t.id))}
                className="text-xs px-1" style={{ color: SHU }} aria-label={`テンプレ「${t.label}」を削除`}>✕</button>
            )}
          </span>
        ))}
        <button onClick={() => setEditTpl(!editTpl)} className="text-xs px-2 py-1.5" style={{ color: MUTE }}>
          {editTpl ? "完了" : "編集"}
        </button>
      </div>

      {/* T字フォーム */}
      <section className="bg-white border rounded-lg p-4" style={{ borderColor: RULE }}>
        <div className="flex gap-3 mb-3">
          <input type="date" value={date} onChange={(ev) => setDate(ev.target.value)}
            className="border rounded px-2 py-2 text-sm" style={{ borderColor: RULE }} />
          <input type="text" value={memo} onChange={(ev) => setMemo(ev.target.value)}
            placeholder="摘要（例: ユニクロで服）"
            className="flex-1 border rounded px-2 py-2 text-sm min-w-0" style={{ borderColor: RULE }} />
        </div>
        <div className="grid grid-cols-2 relative">
          <div className="pr-3">
            <p className="text-xs mb-1 font-semibold" style={{ color: INK, fontFamily: MINCHO }}>借方（使い道・増えた資産）</p>
            <AccountSelect accounts={accounts} value={debit} onChange={setDebit} />
          </div>
          <div className="absolute left-1/2 top-0 bottom-0 w-px" style={{ background: INK }} />
          <div className="pl-3">
            <p className="text-xs mb-1 font-semibold" style={{ color: SHU, fontFamily: MINCHO }}>貸方（出どころ）</p>
            <AccountSelect accounts={accounts} value={credit} onChange={setCredit} />
          </div>
        </div>
        <div className="flex gap-2 mt-3 items-center">
          <div className="flex-1 flex items-center border rounded px-2" style={{ borderColor: RULE }}>
            <span className="text-sm" style={{ color: MUTE }}>¥</span>
            <input type="number" inputMode="numeric" value={amount}
              onChange={(ev) => setAmount(ev.target.value)} placeholder="金額"
              className="w-full px-2 py-2 text-right text-lg outline-none" style={{ fontFamily: MINCHO }} />
          </div>
          <button onClick={saveTemplate} className="px-3 py-2 rounded border text-xs"
            style={{ borderColor: RULE, color: MUTE }}>
            テンプレ保存
          </button>
          <button onClick={submit} className="px-5 py-2 rounded text-white text-sm"
            style={{ background: INK, fontFamily: MINCHO }}>
            記帳する
          </button>
        </div>
        {error && <p className="text-xs mt-2" style={{ color: SHU }}>{error}</p>}
        {accMap[credit]?.card && (
          <p className="text-xs mt-2" style={{ color: MUTE }}>
            カード払いは「{accMap[credit].name}」に未払金（負債）として記録されます。引き落とし時はカードタブの「全額引き落とし」か、引き落としテンプレで二段階目を記帳してください。
          </p>
        )}
      </section>

      {/* 仕訳一覧 */}
      <section className="mt-6">
        <div className="flex items-center justify-between mb-2">
          <h2 className="text-sm" style={{ fontFamily: MINCHO, fontWeight: 600 }}>
            仕訳帳{entries.length > 0 && `（${filterActive ? `${sorted.length}/${entries.length}` : sorted.length}件）`}
          </h2>
          <button onClick={() => setShowFilter(!showFilter)}
            className="text-xs px-3 py-1.5 rounded border"
            style={{ borderColor: filterActive ? INK : RULE, color: filterActive ? INK : MUTE, background: filterActive ? "#fff" : "transparent" }}>
            絞り込み{filterActive ? " ●" : ""}{showFilter ? " ▲" : " ▼"}
          </button>
        </div>

        {showFilter && (
          <div className="bg-white border rounded-lg p-3 mb-3 space-y-2" style={{ borderColor: RULE }}>
            <div>
              <label className="text-xs" style={{ color: MUTE }}>科目で絞る</label>
              <select value={filterAcc} onChange={(ev) => setFilterAcc(ev.target.value)}
                className="w-full bg-white border rounded px-2 py-2 text-sm mt-0.5" style={{ borderColor: RULE }}>
                <option value="all">すべての科目</option>
                {CATEGORIES.map((c) => (
                  <optgroup key={c.key} label={c.label}>
                    {accounts.filter((a) => a.type === c.key).map((a) => (
                      <option key={a.id} value={a.id}>{a.name}</option>
                    ))}
                  </optgroup>
                ))}
              </select>
            </div>
            <div>
              <label className="text-xs" style={{ color: MUTE }}>キーワード（摘要・店名・科目名）</label>
              <input type="text" value={keyword} onChange={(ev) => setKeyword(ev.target.value)}
                placeholder="例: ユニクロ、コンビニ"
                className="w-full border rounded px-2 py-2 text-sm mt-0.5" style={{ borderColor: RULE }} />
            </div>
            <div>
              <label className="text-xs" style={{ color: MUTE }}>並べ替え</label>
              <div className="flex gap-1 mt-0.5 flex-wrap">
                {[["date_desc", "新しい順"], ["date_asc", "古い順"], ["amount_desc", "高い順"], ["amount_asc", "安い順"]].map(([k, label]) => (
                  <button key={k} onClick={() => setSortKey(k)}
                    className="text-xs px-2.5 py-1.5 rounded border"
                    style={{
                      borderColor: sortKey === k ? INK : RULE,
                      background: sortKey === k ? INK : "transparent",
                      color: sortKey === k ? "#fff" : MUTE,
                    }}>
                    {label}
                  </button>
                ))}
              </div>
            </div>
            {filterActive && (
              <div className="flex items-center justify-between border-t pt-2" style={{ borderColor: RULE }}>
                <button onClick={() => { setFilterAcc("all"); setKeyword(""); }}
                  className="text-xs px-2 py-1" style={{ color: SHU }}>絞り込みを解除</button>
                <span className="text-xs" style={{ color: MUTE }}>
                  該当{sorted.length}件・合計 <span style={{ fontFamily: MINCHO, color: INK }}>{yen(filteredTotal)}</span>
                </span>
              </div>
            )}
          </div>
        )}

        {sorted.length === 0 ? (
          <p className="text-sm py-8 text-center" style={{ color: MUTE }}>
            {filterActive ? "条件に合う仕訳がありません。絞り込みを変えてみてください。" : "この期間の仕訳はまだありません。上のフォームかテンプレートから記帳できます。"}
          </p>
        ) : (
          <ul className="bg-white border rounded-lg divide-y" style={{ borderColor: RULE }}>
            {sorted.map((e) => (
              <li key={e.id} className="px-3 py-2.5" style={{ borderColor: RULE }}>
                <div className="flex items-center gap-3">
                  <span className="text-xs w-12 shrink-0" style={{ color: MUTE }}>
                    {e.date.slice(5).replace("-", "/")}
                  </span>
                  <span className="flex-1 min-w-0 text-sm">
                    <span style={{ color: INK, fontWeight: 600 }}>{accMap[e.debit]?.name ?? "?"}</span>
                    <span style={{ color: MUTE }}> ／ </span>
                    <span style={{ color: SHU, fontWeight: 600 }}>{accMap[e.credit]?.name ?? "?"}</span>
                    {e.memo && <span className="block text-xs truncate" style={{ color: MUTE }}>{e.memo}</span>}
                  </span>
                  <span className="text-sm text-right" style={{ fontFamily: MINCHO }}>{yen(e.amount)}</span>
                  <button onClick={() => setConfirmDel(confirmDel === e.id ? null : e.id)} className="text-xs px-1.5 py-1"
                    style={{ color: MUTE }} aria-label="この仕訳を削除">✕</button>
                </div>
                {confirmDel === e.id && (
                  <div className="mt-2 flex items-center justify-between rounded px-3 py-2"
                    style={{ background: "#FDF6F5", border: `1px solid ${SHU}` }}>
                    <span className="text-xs" style={{ color: SHU }}>この仕訳を削除しますか？</span>
                    <span className="flex gap-2">
                      <button onClick={() => { onDelete(e.id); setConfirmDel(null); }}
                        className="text-xs px-3 py-1 rounded text-white" style={{ background: SHU }}>削除する</button>
                      <button onClick={() => setConfirmDel(null)}
                        className="text-xs px-3 py-1 rounded border" style={{ borderColor: RULE, color: MUTE }}>やめる</button>
                    </span>
                  </div>
                )}
              </li>
            ))}
          </ul>
        )}
      </section>
    </div>
  );
}

// ---------- 資産 ----------
function AssetsTab({ accounts, setAccounts, accMap, entries, totals, onAdd, month, onSnapshot }) {
  const assets = accounts.filter((a) => a.type === "asset");
  const liabilities = accounts.filter((a) => a.type === "liability");
  const assetTotal = assets.reduce((s, a) => s + balanceOf(a, totals), 0);
  const liabTotal = liabilities.reduce((s, a) => s + balanceOf(a, totals), 0);

  // 推移データ（月末残高）
  const trend = useMemo(() => {
    if (entries.length === 0) return [];
    const allMonths = [...new Set(entries.map((e) => monthOf(e.date)))].sort();
    const end = month === "all" ? thisMonth() : month.length === 4 ? `${month}-12` : month;
    const first = allMonths[0];
    const list = [];
    let m = first;
    let guard = 0;
    while (m <= end && guard < 120) {
      const t = {};
      for (const e of entries) {
        if (monthOf(e.date) > m) continue;
        t[e.debit] = t[e.debit] || { d: 0, c: 0 };
        t[e.credit] = t[e.credit] || { d: 0, c: 0 };
        t[e.debit].d += e.amount;
        t[e.credit].c += e.amount;
      }
      const at = assets.reduce((s, a) => s + balanceOf(a, t), 0);
      const lt = liabilities.reduce((s, a) => s + balanceOf(a, t), 0);
      list.push({ month: m.slice(2).replace("-", "/"), 総資産: at, 純資産: at - lt });
      const [y, mo] = m.split("-").map(Number);
      m = mo === 12 ? `${y + 1}-01` : `${y}-${String(mo + 1).padStart(2, "0")}`;
      guard++;
    }
    return list.slice(-24);
  }, [entries, accounts, month]);

  const pieData = assets
    .map((a) => ({ name: a.name, value: balanceOf(a, totals) }))
    .filter((x) => x.value > 0);

  return (
    <div className="space-y-6">
      {/* サマリー */}
      <div className="grid grid-cols-3 gap-2">
        {[["総資産", assetTotal, INK], ["負債", liabTotal, SHU], ["純資産", assetTotal - liabTotal, INK]].map(([l, v, c]) => (
          <div key={l} className="bg-white border rounded-lg px-3 py-2.5" style={{ borderColor: RULE }}>
            <p className="text-xs" style={{ color: MUTE }}>{l}</p>
            <p className="text-base mt-0.5" style={{ fontFamily: MINCHO, color: c, fontWeight: 600 }}>{yen(v)}</p>
          </div>
        ))}
      </div>

      {/* 推移グラフ */}
      <section className="bg-white border rounded-lg p-3" style={{ borderColor: RULE }}>
        <h2 className="text-sm mb-2" style={{ fontFamily: MINCHO, fontWeight: 600 }}>資産推移</h2>
        {trend.length < 2 ? (
          <p className="text-sm py-6 text-center" style={{ color: MUTE }}>
            2か月以上の記帳が貯まるとグラフが表示されます。
          </p>
        ) : (
          <div style={{ width: "100%", height: 220 }}>
            <ResponsiveContainer>
              <LineChart data={trend} margin={{ top: 5, right: 8, left: 0, bottom: 0 }}>
                <CartesianGrid stroke={RULE} strokeDasharray="2 4" vertical={false} />
                <XAxis dataKey="month" tick={{ fontSize: 11, fill: MUTE }} />
                <YAxis tickFormatter={man} tick={{ fontSize: 11, fill: MUTE }} width={44} />
                <Tooltip formatter={(v) => yen(v)} />
                <Legend wrapperStyle={{ fontSize: 12 }} />
                <Line type="monotone" dataKey="総資産" stroke={INK} strokeWidth={2} dot={{ r: 2 }} />
                <Line type="monotone" dataKey="純資産" stroke={SHU} strokeWidth={2} strokeDasharray="5 3" dot={{ r: 2 }} />
              </LineChart>
            </ResponsiveContainer>
          </div>
        )}
      </section>

      {/* ポートフォリオ */}
      <section className="bg-white border rounded-lg p-3" style={{ borderColor: RULE }}>
        <h2 className="text-sm mb-2" style={{ fontFamily: MINCHO, fontWeight: 600 }}>ポートフォリオ（内訳）</h2>
        {pieData.length === 0 ? (
          <p className="text-sm py-6 text-center" style={{ color: MUTE }}>残高のある資産がまだありません。</p>
        ) : (
          <div style={{ width: "100%", height: 230 }}>
            <ResponsiveContainer>
              <PieChart>
                <Pie data={pieData} dataKey="value" nameKey="name" innerRadius={50} outerRadius={80} paddingAngle={1}>
                  {pieData.map((_, i) => <Cell key={i} fill={PIE_COLORS[i % PIE_COLORS.length]} />)}
                </Pie>
                <Tooltip formatter={(v) => yen(v)} />
                <Legend wrapperStyle={{ fontSize: 12 }} />
              </PieChart>
            </ResponsiveContainer>
          </div>
        )}
        <ul className="divide-y border-t mt-1" style={{ borderColor: RULE }}>
          {assets.map((a) => {
            const v = balanceOf(a, totals);
            return (
              <li key={a.id} className="flex justify-between py-2 text-sm" style={{ borderColor: RULE }}>
                <span>{a.name}{a.market && <span className="text-xs ml-1" style={{ color: MUTE }}>時価</span>}</span>
                <span style={{ fontFamily: MINCHO, color: v < 0 ? SHU : INK }}>{yen(v)}</span>
              </li>
            );
          })}
        </ul>
      </section>

      {/* 評価額の更新 */}
      <ValuationSection accounts={accounts} setAccounts={setAccounts} totals={totals} onAdd={onAdd} />
    </div>
  );
}

// ---------- 残高更新（全資産: 手動 + 時価資産はAI取得） ----------
function ValuationSection({ accounts, setAccounts, totals, onAdd }) {
  const allAssets = accounts.filter((a) => a.type === "asset" && a.id !== ADV);
  const [sel, setSel] = useState(allAssets[0]?.id ?? "");
  const [value, setValue] = useState("");
  const [msg, setMsg] = useState("");

  const acc = accounts.find((a) => a.id === sel);
  const isMarket = !!acc?.market;
  const current = acc ? balanceOf(acc, totals) : 0;

  const applyValue = (newValue, note) => {
    const diff = Math.round(newValue) - Math.round(current);
    if (diff === 0) { setMsg("現在の帳簿残高と同額のため、仕訳は不要です"); return; }
    // 時価資産は評価益/損、それ以外は現金過不足で調整
    const incomeAcc = isMarket ? "gain" : "adjp";
    const expenseAcc = isMarket ? "loss" : "adjm";
    const e = diff > 0
      ? { id: uid(), date: today(), debit: sel, credit: incomeAcc, amount: diff, memo: `残高更新 ${note || ""}`.trim() }
      : { id: uid(), date: today(), debit: expenseAcc, credit: sel, amount: -diff, memo: `残高更新 ${note || ""}`.trim() };
    onAdd(e);
    const kind = isMarket ? (diff > 0 ? "評価益" : "評価損") : (diff > 0 ? "雑収入" : "雑損失");
    setMsg(`${acc.name}を${yen(newValue)}に更新しました（差額${yen(Math.abs(diff))}を${kind}として記帳）`);
    setValue("");
  };

  if (allAssets.length === 0) return null;

  return (
    <section className="bg-white border rounded-lg p-4" style={{ borderColor: RULE }}>
      <h2 className="text-sm mb-1" style={{ fontFamily: MINCHO, fontWeight: 600 }}>残高の更新</h2>
      <p className="text-xs mb-3" style={{ color: MUTE }}>
        資産の現在残高を入力すると、帳簿残高との差額が自動で仕訳されます。現金や銀行は実際の手持ち額に、株式・投信は時価に合わせて随時更新できます（時価資産は評価益・評価損、その他は現金過不足として記録）。
      </p>
      <select value={sel} onChange={(ev) => { setSel(ev.target.value); setMsg(""); }}
        className="w-full bg-white border rounded px-2 py-2 text-sm mb-2" style={{ borderColor: RULE }}>
        {allAssets.map((a) => <option key={a.id} value={a.id}>{a.name}{a.market ? "（時価）" : ""}</option>)}
      </select>
      <p className="text-xs mb-3" style={{ color: MUTE }}>
        現在の帳簿残高: <span style={{ fontFamily: MINCHO, color: INK }}>{yen(current)}</span>
      </p>

      <div className="flex gap-2">
        <div className="flex-1 flex items-center border rounded px-2" style={{ borderColor: RULE }}>
          <span className="text-sm" style={{ color: MUTE }}>¥</span>
          <input type="number" inputMode="numeric" value={value} onChange={(ev) => setValue(ev.target.value)}
            placeholder="現在の残高（実際の金額）" className="w-full px-2 py-2 text-right outline-none text-sm"
            style={{ fontFamily: MINCHO }} />
        </div>
        <button onClick={() => { const n = Number(value); if (n >= 0 && value !== "") applyValue(n, "手動"); }}
          className="px-4 py-2 rounded text-white text-sm" style={{ background: INK }}>
          残高を更新
        </button>
      </div>
      {msg && <p className="text-xs mt-3" style={{ color: INK }}>{msg}</p>}
    </section>
  );
}

// ---------- カード管理 ----------
function CardsTab({ accounts, setAccounts, accMap, entries, onAdd, onDelete, onSnapshot }) {
  const cards = accounts.filter((a) => a.type === "liability" && a.card);
  const [openId, setOpenId] = useState(cards[0]?.id ?? null);
  const [editId, setEditId] = useState(null);
  const [payAcc, setPayAcc] = useState("bank");
  const [confirmDel, setConfirmDel] = useState(null); // 削除確認中の明細ID
  const [fullPayDate, setFullPayDate] = useState(today()); // 全額引き落としの日付

  // 全期間の各カード内訳
  const totalAll = cards.reduce((s, c) => s + cardBreakdown(c.id, entries).total, 0);
  const selfAll = cards.reduce((s, c) => s + cardBreakdown(c.id, entries).self, 0);
  const advAll = cards.reduce((s, c) => s + cardBreakdown(c.id, entries).advance, 0);

  // 全額引き落とし（未払残高すべて）。日付指定可（未指定なら今日）
  const payCard = (card, payDate) => {
    const bd = cardBreakdown(card.id, entries);
    if (bd.total <= 0) return;
    onAdd({ id: uid(), date: payDate || today(), debit: card.id, credit: payAcc, amount: bd.total, memo: `${card.name} 引き落とし（全額）` });
  };

  // 請求期間（締め日サイクル）単位の引き落とし。日付指定可
  const payCycle = (card, range, amount, payDate) => {
    if (amount <= 0) return;
    const cycleKey = range.to; // 期間の締め日で識別
    onAdd({
      id: uid(), date: payDate || today(), debit: card.id, credit: payAcc, amount,
      memo: `${card.name} 引き落とし（${range.from.slice(2).replaceAll("-", "/")}〜${range.to.slice(2).replaceAll("-", "/")}）`,
      cycleKey, cardId: card.id,
    });
  };

  // ある請求期間がすでに引き落とし済みか
  const isCyclePaid = (card, range) =>
    entries.some((e) => e.cardId === card.id && e.cycleKey === range.to);

  return (
    <div className="space-y-5">
      {/* サマリー */}
      <div className="grid grid-cols-3 gap-2">
        {[["未払合計", totalAll, SHU], ["自己利用", selfAll, INK], ["立替分", advAll, INK]].map(([l, v, c]) => (
          <div key={l} className="bg-white border rounded-lg px-3 py-2.5" style={{ borderColor: RULE }}>
            <p className="text-xs" style={{ color: MUTE }}>{l}</p>
            <p className="text-base mt-0.5" style={{ fontFamily: MINCHO, color: c, fontWeight: 600 }}>{yen(v)}</p>
          </div>
        ))}
      </div>
      <p className="text-xs" style={{ color: MUTE }}>
        各カードの未払残高を「自己利用分」と「立替分」に分けて表示します。引き落とし日は利用月を基準にした次回予定です。立替分は立替タブで精算すると未払から自動で減ります。
      </p>

      {/* 引き落とし口座 */}
      <div className="bg-white border rounded-lg px-4 py-3 flex items-center justify-between" style={{ borderColor: RULE }}>
        <span className="text-sm">引き落とし口座</span>
        <div className="w-44">
          <AccountSelect accounts={accounts} value={payAcc} onChange={setPayAcc} filterTypes={["asset"]} />
        </div>
      </div>

      {/* カード一覧 */}
      <div className="space-y-3">
        {cards.map((card) => {
          const bd = cardBreakdown(card.id, entries);
          const open = openId === card.id;
          const payDate = nextPayDate(card, thisMonth());
          const recent = entries
            .filter((e) => e.credit === card.id || e.debit === card.id)
            .sort((a, b) => (a.date < b.date ? 1 : -1))
            .slice(0, 30);
          return (
            <section key={card.id} className="bg-white border rounded-lg overflow-hidden" style={{ borderColor: RULE }}>
              {/* ヘッダー行 */}
              <button onClick={() => setOpenId(open ? null : card.id)}
                className="w-full px-4 py-3 flex items-center justify-between text-left">
                <div className="min-w-0">
                  <p className="text-sm font-semibold" style={{ fontFamily: MINCHO }}>{card.name}</p>
                  <p className="text-xs mt-0.5" style={{ color: MUTE }}>
                    翌{card.payMonth === 1 ? "月" : "々月"}{card.payDay}日払い
                    {payDate && ` ・ 次回 ${payDate.slice(5).replace("-", "/")}`}
                  </p>
                </div>
                <div className="text-right shrink-0 ml-2">
                  <p className="text-base" style={{ fontFamily: MINCHO, fontWeight: 600, color: bd.total > 0 ? SHU : INK }}>
                    {yen(bd.total)}
                  </p>
                  <p className="text-xs" style={{ color: MUTE }}>{open ? "閉じる ▲" : "明細 ▼"}</p>
                </div>
              </button>

              {open && (
                <div className="border-t" style={{ borderColor: RULE }}>
                  {/* 内訳 */}
                  <div className="grid grid-cols-2 divide-x" style={{ borderColor: RULE }}>
                    <div className="px-4 py-2.5">
                      <p className="text-xs" style={{ color: MUTE }}>未払・自己利用分</p>
                      <p className="text-sm" style={{ fontFamily: MINCHO, color: INK, fontWeight: 600 }}>{yen(bd.self)}</p>
                    </div>
                    <div className="px-4 py-2.5">
                      <p className="text-xs" style={{ color: MUTE }}>未払・経費立替分</p>
                      <p className="text-sm" style={{ fontFamily: MINCHO, color: INK, fontWeight: 600 }}>{yen(bd.advance)}</p>
                    </div>
                  </div>

                  {/* 請求期間の利用累計・期間引き落とし */}
                  <CardUsageSummary card={card} entries={entries}
                    onPayCycle={payCycle} isCyclePaid={isCyclePaid} />

                  {/* 操作 */}
                  <div className="px-4 py-2.5 border-t" style={{ borderColor: RULE }}>
                    <div className="flex gap-2 flex-wrap items-center">
                      <input type="date" value={fullPayDate} onChange={(ev) => setFullPayDate(ev.target.value)}
                        className="border rounded px-2 py-1.5 text-xs" style={{ borderColor: RULE }} />
                      <button onClick={() => payCard(card, fullPayDate)} disabled={bd.total <= 0}
                        className="text-xs px-3 py-1.5 rounded text-white" style={{ background: INK, opacity: bd.total <= 0 ? 0.4 : 1 }}>
                        この日付で全額引き落とし（{yen(bd.total)}）
                      </button>
                      <button onClick={() => setEditId(editId === card.id ? null : card.id)}
                        className="text-xs px-3 py-1.5 rounded border" style={{ borderColor: RULE, color: MUTE }}>
                        支払い設定を編集
                      </button>
                    </div>
                    <p className="text-xs mt-1.5" style={{ color: MUTE }}>
                      未払残高すべてを指定日に引き落とします。日付は初期で今日です。
                    </p>
                  </div>

                  {/* 編集フォーム */}
                  {editId === card.id && (
                    <CardEditor card={card} accounts={accounts} setAccounts={setAccounts} onClose={() => setEditId(null)} onSnapshot={onSnapshot} />
                  )}

                  {/* 利用明細 */}
                  <div className="border-t" style={{ borderColor: RULE }}>
                    <p className="px-4 pt-2.5 pb-1 text-xs" style={{ color: MUTE }}>利用・支払明細</p>
                    {recent.length === 0 ? (
                      <p className="px-4 py-4 text-sm text-center" style={{ color: MUTE }}>明細はまだありません。</p>
                    ) : (
                      <ul className="divide-y" style={{ borderColor: RULE }}>
                        {recent.map((e) => {
                          const isPayment = e.debit === card.id;
                          const isAdvance = e.credit === card.id && e.debit === ADV;
                          return (
                            <li key={e.id} className="px-4 py-2" style={{ borderColor: RULE }}>
                              <div className="flex items-center gap-2 text-sm">
                                <span className="text-xs w-12 shrink-0" style={{ color: MUTE }}>{e.date.slice(5).replace("-", "/")}</span>
                                <span className="flex-1 min-w-0 truncate">
                                  {isPayment ? "引き落とし" : (accMap[e.debit]?.name ?? "?")}
                                  {!isPayment && (
                                    <span className="text-xs ml-1.5 px-1.5 py-0.5 rounded"
                                      style={{ color: isAdvance ? SHU : MUTE, background: isAdvance ? "#FDF6F5" : PAPER }}>
                                      {isAdvance ? "立替" : "自己"}
                                    </span>
                                  )}
                                  {e.memo && <span className="block text-xs truncate" style={{ color: MUTE }}>{e.memo}</span>}
                                </span>
                                <span style={{ fontFamily: MINCHO, color: isPayment ? INK : SHU }}>
                                  {isPayment ? "−" : "+"}{yen(e.amount)}
                                </span>
                                <button onClick={() => setConfirmDel(confirmDel === e.id ? null : e.id)} className="text-xs px-1" style={{ color: MUTE }}
                                  aria-label="この明細を削除">✕</button>
                              </div>
                              {confirmDel === e.id && (
                                <div className="mt-2 flex items-center justify-between rounded px-3 py-2"
                                  style={{ background: "#FDF6F5", border: `1px solid ${SHU}` }}>
                                  <span className="text-xs" style={{ color: SHU }}>この明細を削除しますか？</span>
                                  <span className="flex gap-2">
                                    <button onClick={() => { onDelete(e.id); setConfirmDel(null); }}
                                      className="text-xs px-3 py-1 rounded text-white" style={{ background: SHU }}>削除する</button>
                                    <button onClick={() => setConfirmDel(null)}
                                      className="text-xs px-3 py-1 rounded border" style={{ borderColor: RULE, color: MUTE }}>やめる</button>
                                  </span>
                                </div>
                              )}
                            </li>
                          );
                        })}
                      </ul>
                    )}
                  </div>
                </div>
              )}
            </section>
          );
        })}
      </div>
    </div>
  );
}

// カード利用累計（請求期間ごと）
function CardUsageSummary({ card, entries, onPayCycle, isCyclePaid }) {
  const auto = billingCycle(card, today());
  const [mode, setMode] = useState("auto"); // auto | custom
  const [from, setFrom] = useState(auto.from);
  const [to, setTo] = useState(auto.to);
  const [offset, setOffset] = useState(0); // 自動モードで何サイクル前か

  // 自動モードのサイクルを offset 分ずらす（隙間なく連続する請求期間）
  const shiftedAuto = useMemo(() => billingCycleByOffset(card, offset), [card, offset]);

  const range = mode === "auto" ? shiftedAuto : { from, to };
  const usage = cardUsageInRange(card.id, entries, range.from, range.to);
  const paid = mode === "auto" && isCyclePaid && isCyclePaid(card, range);

  // 引き落とし日（締め日サイクルに応じた予定日を初期値に。期間が変わると追従）
  const plannedPayDate = payDateForClosing(card, range.to);
  const [payDate, setPayDate] = useState(plannedPayDate);
  useEffect(() => { setPayDate(plannedPayDate); }, [plannedPayDate]);

  const fmt = (d) => (d ? d.slice(2).replaceAll("-", "/") : "—");

  return (
    <div className="border-t" style={{ borderColor: RULE, background: PAPER }}>
      <div className="px-4 py-2.5">
        <div className="flex items-center justify-between mb-2">
          <p className="text-xs font-semibold" style={{ color: INK, fontFamily: MINCHO }}>利用累計</p>
          <div className="flex gap-1 text-xs">
            <button onClick={() => setMode("auto")}
              className="px-2 py-1 rounded" style={{ background: mode === "auto" ? INK : "transparent", color: mode === "auto" ? "#fff" : MUTE }}>
              締め日サイクル
            </button>
            <button onClick={() => setMode("custom")}
              className="px-2 py-1 rounded" style={{ background: mode === "custom" ? INK : "transparent", color: mode === "custom" ? "#fff" : MUTE }}>
              期間を指定
            </button>
          </div>
        </div>

        {mode === "auto" ? (
          <div className="flex items-center justify-between mb-2">
            <button onClick={() => setOffset(offset - 1)} className="text-sm px-2 py-1" style={{ color: MUTE }} aria-label="前の請求期間">◀</button>
            <span className="text-xs" style={{ color: MUTE }}>
              {fmt(range.from)} 〜 {fmt(range.to)}
              {offset === 0 && <span className="ml-1" style={{ color: SHU }}>（今期）</span>}
            </span>
            <button onClick={() => setOffset(offset + 1)} disabled={offset >= 0}
              className="text-sm px-2 py-1" style={{ color: offset >= 0 ? RULE : MUTE }} aria-label="次の請求期間">▶</button>
          </div>
        ) : (
          <div className="flex gap-2 mb-2 items-center">
            <input type="date" value={from} onChange={(ev) => setFrom(ev.target.value)}
              className="flex-1 border rounded px-2 py-1.5 text-xs bg-white" style={{ borderColor: RULE }} />
            <span className="text-xs" style={{ color: MUTE }}>〜</span>
            <input type="date" value={to} onChange={(ev) => setTo(ev.target.value)}
              className="flex-1 border rounded px-2 py-1.5 text-xs bg-white" style={{ borderColor: RULE }} />
          </div>
        )}

        <div className="bg-white border rounded" style={{ borderColor: RULE }}>
          <div className="flex justify-between px-3 py-2 border-b" style={{ borderColor: RULE }}>
            <span className="text-sm">利用累計（自己＋立替）</span>
            <span className="text-base" style={{ fontFamily: MINCHO, fontWeight: 600, color: INK }}>{yen(usage.total)}</span>
          </div>
          <div className="grid grid-cols-2 divide-x" style={{ borderColor: RULE }}>
            <div className="px-3 py-1.5 flex justify-between">
              <span className="text-xs" style={{ color: MUTE }}>自己</span>
              <span className="text-xs" style={{ fontFamily: MINCHO }}>{yen(usage.self)}</span>
            </div>
            <div className="px-3 py-1.5 flex justify-between">
              <span className="text-xs" style={{ color: MUTE }}>立替</span>
              <span className="text-xs" style={{ fontFamily: MINCHO }}>{yen(usage.advance)}</span>
            </div>
          </div>
        </div>

        {/* この請求期間を引き落とす（締め日サイクルモードのみ） */}
        {mode === "auto" && (
          <div className="mt-2">
            {paid ? (
              <p className="text-xs px-1 py-1.5 rounded text-center" style={{ color: MUTE, background: "#fff", border: `1px solid ${RULE}` }}>
                この期間（{fmt(range.from)}〜{fmt(range.to)}）は引き落とし記帳済みです
              </p>
            ) : (
              <div className="bg-white border rounded p-2.5" style={{ borderColor: RULE }}>
                <div className="flex items-center justify-between mb-2">
                  <span className="text-xs" style={{ color: MUTE }}>引き落とし日</span>
                  <input type="date" value={payDate} onChange={(ev) => setPayDate(ev.target.value)}
                    className="border rounded px-2 py-1 text-xs" style={{ borderColor: RULE }} />
                </div>
                <button onClick={() => onPayCycle && onPayCycle(card, range, usage.total, payDate)}
                  disabled={usage.total <= 0}
                  className="w-full text-xs px-3 py-2 rounded text-white"
                  style={{ background: INK, opacity: usage.total <= 0 ? 0.4 : 1 }}>
                  この日付で引き落とす（{yen(usage.total)}）
                </button>
                <p className="text-xs mt-1" style={{ color: MUTE }}>
                  予定日（{fmt(plannedPayDate)}）を初期表示しています。過去分の記帳時は実際の引き落とし日に合わせて変更してください。
                </p>
              </div>
            )}
          </div>
        )}

        {mode === "auto" && (
          <p className="text-xs mt-1.5" style={{ color: MUTE }}>
            締め日（{card.closingDay === 31 ? "月末" : card.closingDay + "日"}）で区切った請求期間です。◀▶で期間を選び、その期間分だけ引き落とせます。締め日は支払い設定で変更できます。
          </p>
        )}
      </div>
    </div>
  );
}

// カードの支払い設定編集
function CardEditor({ card, accounts, setAccounts, onClose, onSnapshot }) {
  const [name, setName] = useState(card.name);
  const [closingDay, setClosingDay] = useState(card.closingDay || 31);
  const [payMonth, setPayMonth] = useState(card.payMonth || 1);
  const [payDay, setPayDay] = useState(card.payDay || 27);

  const save = () => {
    if (onSnapshot) onSnapshot("カード設定の変更");
    setAccounts((p) => p.map((a) => (a.id === card.id
      ? { ...a, name: name.trim() || a.name, closingDay: Number(closingDay), payMonth: Number(payMonth), payDay: Number(payDay) }
      : a)));
    onClose();
  };

  return (
    <div className="px-4 py-3 border-t" style={{ borderColor: RULE, background: PAPER }}>
      <div className="space-y-2">
        <div>
          <label className="text-xs" style={{ color: MUTE }}>カード名</label>
          <input value={name} onChange={(ev) => setName(ev.target.value)}
            className="w-full border rounded px-2 py-1.5 text-sm bg-white" style={{ borderColor: RULE }} />
        </div>
        <div className="flex gap-2">
          <div className="flex-1">
            <label className="text-xs" style={{ color: MUTE }}>締め日</label>
            <select value={closingDay} onChange={(ev) => setClosingDay(ev.target.value)}
              className="w-full border rounded px-2 py-1.5 text-sm bg-white" style={{ borderColor: RULE }}>
              {Array.from({ length: 28 }, (_, i) => i + 1).map((d) => (
                <option key={d} value={d}>{d}日</option>
              ))}
              <option value={31}>月末</option>
            </select>
          </div>
          <div className="flex-1">
            <label className="text-xs" style={{ color: MUTE }}>支払いタイミング</label>
            <select value={payMonth} onChange={(ev) => setPayMonth(ev.target.value)}
              className="w-full border rounded px-2 py-1.5 text-sm bg-white" style={{ borderColor: RULE }}>
              <option value={1}>翌月</option>
              <option value={2}>翌々月</option>
            </select>
          </div>
          <div className="w-20">
            <label className="text-xs" style={{ color: MUTE }}>支払日</label>
            <input type="number" min={1} max={31} value={payDay} onChange={(ev) => setPayDay(ev.target.value)}
              className="w-full border rounded px-2 py-1.5 text-sm bg-white text-right" style={{ borderColor: RULE }} />
          </div>
        </div>
        <div className="flex gap-2 pt-1">
          <button onClick={save} className="text-xs px-4 py-1.5 rounded text-white" style={{ background: INK }}>保存</button>
          <button onClick={onClose} className="text-xs px-3 py-1.5" style={{ color: MUTE }}>取消</button>
        </div>
      </div>
    </div>
  );
}

// ---------- 立替管理 ----------
function AdvanceTab({ accounts, accMap, entries, onSettle }) {
  const [deposit, setDeposit] = useState("bank");
  const advances = entries
    .filter((e) => e.debit === ADV)
    .sort((a, b) => (a.date < b.date ? 1 : -1));
  const unsettled = advances.filter((e) => !e.settled);
  const unsettledTotal = unsettled.reduce((s, e) => s + e.amount, 0);

  return (
    <div className="space-y-5">
      <div className="bg-white border rounded-lg px-4 py-3 flex items-center justify-between" style={{ borderColor: RULE }}>
        <div>
          <p className="text-xs" style={{ color: MUTE }}>未精算の立替金</p>
          <p className="text-xl mt-0.5" style={{ fontFamily: MINCHO, fontWeight: 600, color: unsettledTotal > 0 ? SHU : INK }}>
            {yen(unsettledTotal)}
          </p>
          <p className="text-xs mt-0.5" style={{ color: MUTE }}>{unsettled.length}件</p>
        </div>
        <div className="text-right">
          <p className="text-xs mb-1" style={{ color: MUTE }}>精算金の入金先</p>
          <AccountSelect accounts={accounts.filter((a) => a.id !== ADV)} value={deposit}
            onChange={setDeposit} filterTypes={["asset"]} />
        </div>
      </div>

      <p className="text-xs" style={{ color: MUTE }}>
        経費を立て替えたら、仕訳帳の「経費立替（現金）」「経費立替（カード）」テンプレで記帳するとここに表示されます。会社などから返金されたら「精算」を押すと、入金仕訳が自動で作成されます。
      </p>

      {advances.length === 0 ? (
        <p className="text-sm py-8 text-center" style={{ color: MUTE }}>立替の記録はまだありません。</p>
      ) : (
        <ul className="bg-white border rounded-lg divide-y" style={{ borderColor: RULE }}>
          {advances.map((e) => (
            <li key={e.id} className="px-3 py-2.5 flex items-center gap-3" style={{ borderColor: RULE }}>
              <span className="text-xs w-14 shrink-0" style={{ color: MUTE }}>{e.date.slice(2).replaceAll("-", "/")}</span>
              <span className="flex-1 min-w-0 text-sm">
                {e.memo || "経費立替"}
                <span className="block text-xs" style={{ color: MUTE }}>
                  支払元: {accMap[e.credit]?.name ?? "?"}
                </span>
              </span>
              <span className="text-sm" style={{ fontFamily: MINCHO }}>{yen(e.amount)}</span>
              {e.settled ? (
                <span className="text-xs px-2 py-1 rounded" style={{ color: MUTE, background: PAPER }}>精算済</span>
              ) : (
                <button onClick={() => onSettle(e, deposit)}
                  className="text-xs px-3 py-1.5 rounded text-white" style={{ background: SHU }}>
                  精算
                </button>
              )}
            </li>
          ))}
        </ul>
      )}
    </div>
  );
}

// ---------- 予算・固定費 ----------
function BudgetTab({ accounts, accMap, totals, budgets, setBudgets, fixed, setFixed, entries, onAdd, targetMonth }) {
  const expenses = accounts.filter((a) => a.type === "expense" && a.id !== "loss");
  const [fName, setFName] = useState("");
  const [fAmount, setFAmount] = useState("");
  const [fDebit, setFDebit] = useState("liv");
  const [fCredit, setFCredit] = useState("bank");

  const addFixed = () => {
    const n = Number(fAmount);
    if (!fName.trim() || !n || n <= 0) return;
    setFixed((p) => [...p, { id: uid(), name: fName.trim(), amount: n, debit: fDebit, credit: fCredit }]);
    setFName(""); setFAmount("");
  };

  const recordedThisMonth = (f) =>
    entries.some((e) => e.fixedId === f.id && monthOf(e.date) === targetMonth);

  const recordFixed = (f) => {
    if (recordedThisMonth(f)) return;
    const date = targetMonth === thisMonth() ? today() : targetMonth + "-28";
    onAdd({ id: uid(), date, debit: f.debit, credit: f.credit, amount: f.amount, memo: `固定費: ${f.name}`, fixedId: f.id });
  };

  // 固定費の並び替え（上下入れ替え）
  const moveFixed = (idx, dir) => {
    const j = idx + dir;
    if (j < 0 || j >= fixed.length) return;
    setFixed((p) => {
      const next = [...p];
      [next[idx], next[j]] = [next[j], next[idx]];
      return next;
    });
  };

  // 固定費の合計と、当月の記帳状況
  const fixedTotal = fixed.reduce((s, f) => s + f.amount, 0);
  const fixedDoneTotal = fixed.filter((f) => recordedThisMonth(f)).reduce((s, f) => s + f.amount, 0);
  const fixedRemain = fixedTotal - fixedDoneTotal;

  const budgetTotal = expenses.reduce((s, a) => s + (Number(budgets[a.id]) || 0), 0);
  const actualTotal = expenses.reduce((s, a) => s + balanceOf(a, totals), 0);

  return (
    <div className="space-y-6">
      {/* 予算管理 */}
      <section className="bg-white border rounded-lg p-4" style={{ borderColor: RULE }}>
        <h2 className="text-sm mb-1" style={{ fontFamily: MINCHO, fontWeight: 600 }}>
          予算管理 <span className="text-xs font-normal" style={{ color: MUTE }}>{targetMonth.replace("-", "年")}月</span>
        </h2>
        <p className="text-xs mb-3" style={{ color: MUTE }}>
          費用科目ごとに月予算を設定できます。実績は選択中の月の支出です。
        </p>
        <div className="space-y-3">
          {expenses.map((a) => {
            const budget = Number(budgets[a.id]) || 0;
            const actual = balanceOf(a, totals);
            const pct = budget > 0 ? Math.min((actual / budget) * 100, 100) : 0;
            const over = budget > 0 && actual > budget;
            return (
              <div key={a.id}>
                <div className="flex items-center gap-2 text-sm">
                  <span className="flex-1">{a.name}</span>
                  <span style={{ fontFamily: MINCHO, color: over ? SHU : INK }}>{yen(actual)}</span>
                  <span className="text-xs" style={{ color: MUTE }}>／</span>
                  <input type="number" inputMode="numeric" value={budgets[a.id] ?? ""}
                    onChange={(ev) => setBudgets((p) => ({ ...p, [a.id]: ev.target.value }))}
                    placeholder="予算" className="w-24 border rounded px-2 py-1 text-right text-sm"
                    style={{ borderColor: RULE, fontFamily: MINCHO }} />
                </div>
                {budget > 0 && (
                  <div className="h-1.5 rounded-full mt-1" style={{ background: PAPER }}>
                    <div className="h-1.5 rounded-full" style={{ width: pct + "%", background: over ? SHU : INK }} />
                  </div>
                )}
                {over && <p className="text-xs mt-0.5" style={{ color: SHU }}>予算を{yen(actual - budget)}超過しています</p>}
              </div>
            );
          })}
        </div>
        <div className="flex justify-between border-t mt-4 pt-2 text-sm" style={{ borderColor: INK }}>
          <span style={{ fontFamily: MINCHO, fontWeight: 600 }}>合計</span>
          <span style={{ fontFamily: MINCHO, fontWeight: 600, color: budgetTotal > 0 && actualTotal > budgetTotal ? SHU : INK }}>
            {yen(actualTotal)}{budgetTotal > 0 && ` ／ ${yen(budgetTotal)}`}
          </span>
        </div>
      </section>

      {/* 固定費管理 */}
      <section className="bg-white border rounded-lg p-4" style={{ borderColor: RULE }}>
        <h2 className="text-sm mb-1" style={{ fontFamily: MINCHO, fontWeight: 600 }}>固定費管理</h2>
        <p className="text-xs mb-3" style={{ color: MUTE }}>
          家賃や通信費など毎月の固定費を登録すると、ワンタップでその月の仕訳を記帳できます。▲▼で並び替えできます。
        </p>
        {fixed.length > 0 && (
          <>
            <ul className="divide-y mb-3" style={{ borderColor: RULE }}>
              {fixed.map((f, idx) => {
                const done = recordedThisMonth(f);
                return (
                  <li key={f.id} className="py-2 flex items-center gap-2 text-sm" style={{ borderColor: RULE }}>
                    <span className="flex flex-col leading-none">
                      <button onClick={() => moveFixed(idx, -1)} disabled={idx === 0}
                        className="text-xs px-1" style={{ color: idx === 0 ? RULE : MUTE }} aria-label="上へ">▲</button>
                      <button onClick={() => moveFixed(idx, 1)} disabled={idx === fixed.length - 1}
                        className="text-xs px-1" style={{ color: idx === fixed.length - 1 ? RULE : MUTE }} aria-label="下へ">▼</button>
                    </span>
                    <span className="flex-1 min-w-0">
                      {f.name}
                      <span className="block text-xs" style={{ color: MUTE }}>
                        {accMap[f.debit]?.name}／{accMap[f.credit]?.name}
                      </span>
                    </span>
                    <span style={{ fontFamily: MINCHO }}>{yen(f.amount)}</span>
                    {done ? (
                      <span className="text-xs px-2 py-1 rounded" style={{ color: MUTE, background: PAPER }}>今月記帳済</span>
                    ) : (
                      <button onClick={() => recordFixed(f)}
                        className="text-xs px-3 py-1.5 rounded text-white" style={{ background: INK }}>
                        今月分を記帳
                      </button>
                    )}
                    <button onClick={() => setFixed((p) => p.filter((x) => x.id !== f.id))}
                      className="text-xs" style={{ color: MUTE }} aria-label={`固定費「${f.name}」を削除`}>✕</button>
                  </li>
                );
              })}
            </ul>

            {/* 合計 */}
            <div className="border-t pt-2 mb-3 space-y-1" style={{ borderColor: INK }}>
              <div className="flex justify-between text-sm">
                <span style={{ fontFamily: MINCHO, fontWeight: 600 }}>固定費 合計（月額）</span>
                <span style={{ fontFamily: MINCHO, fontWeight: 600 }}>{yen(fixedTotal)}</span>
              </div>
              <div className="flex justify-between text-xs" style={{ color: MUTE }}>
                <span>うち今月記帳済</span>
                <span style={{ fontFamily: MINCHO }}>{yen(fixedDoneTotal)}</span>
              </div>
              <div className="flex justify-between text-xs" style={{ color: fixedRemain > 0 ? SHU : MUTE }}>
                <span>今月の記帳残り</span>
                <span style={{ fontFamily: MINCHO }}>{yen(fixedRemain)}</span>
              </div>
            </div>

            {/* 一括記帳 */}
            {fixedRemain > 0 && (
              <button
                onClick={() => fixed.forEach((f) => { if (!recordedThisMonth(f)) recordFixed(f); })}
                className="w-full text-xs px-3 py-2 rounded border mb-4"
                style={{ borderColor: INK, color: INK }}>
                未記帳の固定費をまとめて今月分記帳（{yen(fixedRemain)}）
              </button>
            )}
          </>
        )}
        <div className="flex gap-2 flex-wrap">
          <input value={fName} onChange={(ev) => setFName(ev.target.value)} placeholder="名称（例: 家賃）"
            className="flex-1 border rounded px-2 py-2 text-sm min-w-28" style={{ borderColor: RULE }} />
          <input type="number" inputMode="numeric" value={fAmount} onChange={(ev) => setFAmount(ev.target.value)}
            placeholder="金額" className="w-24 border rounded px-2 py-2 text-sm text-right" style={{ borderColor: RULE }} />
          <div className="w-full grid grid-cols-2 gap-2">
            <AccountSelect accounts={accounts} value={fDebit} onChange={setFDebit} filterTypes={["expense"]} />
            <AccountSelect accounts={accounts} value={fCredit} onChange={setFCredit} filterTypes={["asset", "liability"]} />
          </div>
          <button onClick={addFixed} className="px-4 py-2 rounded text-white text-sm w-full" style={{ background: INK }}>
            固定費を追加する
          </button>
        </div>
      </section>
    </div>
  );
}
