function StatementRow({ name, value, color, bold }) {
  return (
    <div className="flex justify-between px-3 py-1.5 text-sm">
      <span className={bold ? "font-semibold" : ""} style={bold ? { fontFamily: MINCHO } : {}}>{name}</span>
      <span style={{ fontFamily: MINCHO, color: color || INK, fontWeight: bold ? 600 : 400 }}>{yen(value)}</span>
    </div>
  );
}

function PLView({ accounts, totals, month }) {
  const rows = (type) =>
    accounts.filter((a) => a.type === type)
      .map((a) => ({ a, v: balanceOf(a, totals) }))
      .filter((x) => x.v !== 0);
  const income = rows("income").reduce((s, x) => s + x.v, 0);
  const expense = rows("expense").reduce((s, x) => s + x.v, 0);
  const net = income - expense;
  const label = month === "all" ? "全期間" : month.length === 4 ? month + "年" : month.replace("-", "年") + "月";
  return (
    <section className="bg-white border rounded-lg py-3" style={{ borderColor: RULE }}>
      <h2 className="px-3 pb-2 text-sm border-b" style={{ fontFamily: MINCHO, fontWeight: 600, borderColor: RULE }}>
        損益計算書 <span className="text-xs font-normal" style={{ color: MUTE }}>{label}</span>
      </h2>
      <div className="pt-2">
        {rows("income").map((x) => <StatementRow key={x.a.id} name={x.a.name} value={x.v} color={SHU} />)}
        <StatementRow name="収益合計" value={income} color={SHU} bold />
        <div className="my-2 border-t" style={{ borderColor: RULE }} />
        {rows("expense").map((x) => <StatementRow key={x.a.id} name={x.a.name} value={x.v} />)}
        <StatementRow name="費用合計" value={expense} bold />
        <div className="my-2 border-t-2" style={{ borderColor: INK }} />
        <StatementRow name={net >= 0 ? "当期黒字" : "当期赤字"} value={net} color={net >= 0 ? INK : SHU} bold />
      </div>
    </section>
  );
}

function BSView({ accounts, totals, month }) {
  const rows = (types) =>
    accounts.filter((a) => types.includes(a.type))
      .map((a) => ({ a, v: balanceOf(a, totals) }))
      .filter((x) => x.v !== 0);
  const assets = rows(["asset"]);
  const liabEq = rows(["liability", "equity"]);
  const assetSum = assets.reduce((s, x) => s + x.v, 0);
  const liabEqSum = liabEq.reduce((s, x) => s + x.v, 0);
  const cumNet = accounts.filter((a) => a.type === "income").reduce((s, a) => s + balanceOf(a, totals), 0)
    - accounts.filter((a) => a.type === "expense").reduce((s, a) => s + balanceOf(a, totals), 0);
  const label = month === "all" ? "現在" : month.length === 4 ? month + "年末時点" : month.replace("-", "年") + "月末時点";
  return (
    <section className="bg-white border rounded-lg py-3" style={{ borderColor: RULE }}>
      <h2 className="px-3 pb-2 text-sm border-b" style={{ fontFamily: MINCHO, fontWeight: 600, borderColor: RULE }}>
        貸借対照表 <span className="text-xs font-normal" style={{ color: MUTE }}>{label}</span>
      </h2>
      <div className="grid grid-cols-2 pt-2">
        <div className="border-r" style={{ borderColor: RULE }}>
          {assets.map((x) => <StatementRow key={x.a.id} name={x.a.name} value={x.v} />)}
          <StatementRow name="資産合計" value={assetSum} bold />
        </div>
        <div>
          {liabEq.map((x) => <StatementRow key={x.a.id} name={x.a.name} value={x.v} color={SHU} />)}
          <StatementRow name="累計収支" value={cumNet} color={SHU} />
          <StatementRow name="負債・純資産合計" value={liabEqSum + cumNet} color={SHU} bold />
        </div>
      </div>
    </section>
  );
}

function TrialView({ accounts, totals }) {
  let dSum = 0, cSum = 0;
  const rows = accounts.map((a) => {
    const t = totals[a.id] || { d: 0, c: 0 };
    if (t.d === 0 && t.c === 0) return null;
    const bal = balanceOf(a, totals);
    const normal = CAT_MAP[a.type].normal;
    const dBal = normal === "debit" ? Math.max(bal, 0) : Math.max(-bal, 0);
    const cBal = normal === "credit" ? Math.max(bal, 0) : Math.max(-bal, 0);
    dSum += dBal; cSum += cBal;
    return { ...a, dBal, cBal };
  }).filter(Boolean);

  return (
    <div className="bg-white border rounded-lg overflow-hidden" style={{ borderColor: RULE }}>
      <table className="w-full text-sm">
        <thead>
          <tr className="text-xs" style={{ color: MUTE }}>
            <th className="text-left px-3 py-2 font-normal">勘定科目</th>
            <th className="text-right px-3 py-2 font-normal" style={{ color: INK }}>借方残高</th>
            <th className="text-right px-3 py-2 font-normal" style={{ color: SHU }}>貸方残高</th>
          </tr>
        </thead>
        <tbody>
          {rows.length === 0 && (
            <tr><td colSpan={3} className="px-3 py-8 text-center" style={{ color: MUTE }}>この期間の記帳はまだありません。</td></tr>
          )}
          {rows.map((r) => (
            <tr key={r.id} className="border-t" style={{ borderColor: RULE }}>
              <td className="px-3 py-2">
                <span className="text-xs mr-2" style={{ color: MUTE }}>{CAT_MAP[r.type].label}</span>{r.name}
              </td>
              <td className="text-right px-3 py-2" style={{ fontFamily: MINCHO, color: INK }}>{r.dBal ? yen(r.dBal) : ""}</td>
              <td className="text-right px-3 py-2" style={{ fontFamily: MINCHO, color: SHU }}>{r.cBal ? yen(r.cBal) : ""}</td>
            </tr>
          ))}
          {rows.length > 0 && (
            <tr className="border-t-2" style={{ borderColor: INK }}>
              <td className="px-3 py-2 font-semibold" style={{ fontFamily: MINCHO }}>合計</td>
              <td className="text-right px-3 py-2 font-semibold" style={{ fontFamily: MINCHO, color: INK }}>{yen(dSum)}</td>
              <td className="text-right px-3 py-2 font-semibold" style={{ fontFamily: MINCHO, color: SHU }}>{yen(cSum)}</td>
            </tr>
          )}
        </tbody>
      </table>
      {rows.length > 0 && dSum === cSum && (
        <p className="text-xs px-3 py-2 border-t" style={{ color: MUTE, borderColor: RULE }}>
          借方合計と貸方合計が一致しています（貸借平均の原理）。
        </p>
      )}
    </div>
  );
}

function LedgerView({ accounts, accMap, entries }) {
  const [accId, setAccId] = useState(accounts[0]?.id ?? "");
  const acc = accMap[accId];
  const normal = acc ? CAT_MAP[acc.type].normal : "debit";

  const rows = useMemo(() => {
    if (!acc) return [];
    const list = entries.filter((e) => e.debit === accId || e.credit === accId)
      .sort((a, b) => (a.date > b.date ? 1 : -1));
    let bal = 0;
    return list.map((e) => {
      const isDebit = e.debit === accId;
      bal += (normal === "debit" ? 1 : -1) * (isDebit ? e.amount : -e.amount);
      return { ...e, isDebit, bal, other: isDebit ? accMap[e.credit]?.name : accMap[e.debit]?.name };
    });
  }, [entries, accId, acc, normal, accMap]);

  return (
    <div>
      <AccountSelect accounts={accounts} value={accId} onChange={setAccId} />
      <div className="mt-3">
        {rows.length === 0 ? (
          <p className="text-sm py-8 text-center" style={{ color: MUTE }}>この科目の記帳はまだありません。</p>
        ) : (
          <div className="bg-white border rounded-lg overflow-hidden" style={{ borderColor: RULE }}>
            <table className="w-full text-sm">
              <thead>
                <tr className="text-xs" style={{ color: MUTE }}>
                  <th className="text-left px-3 py-2 font-normal">日付・相手科目</th>
                  <th className="text-right px-2 py-2 font-normal" style={{ color: INK }}>借方</th>
                  <th className="text-right px-2 py-2 font-normal" style={{ color: SHU }}>貸方</th>
                  <th className="text-right px-3 py-2 font-normal">残高</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r) => (
                  <tr key={r.id} className="border-t" style={{ borderColor: RULE }}>
                    <td className="px-3 py-2">
                      <span className="text-xs" style={{ color: MUTE }}>{r.date.slice(5).replace("-", "/")}</span> {r.other}
                    </td>
                    <td className="text-right px-2 py-2" style={{ fontFamily: MINCHO, color: INK }}>{r.isDebit ? yen(r.amount) : ""}</td>
                    <td className="text-right px-2 py-2" style={{ fontFamily: MINCHO, color: SHU }}>{!r.isDebit ? yen(r.amount) : ""}</td>
                    <td className="text-right px-3 py-2" style={{ fontFamily: MINCHO, color: r.bal < 0 ? SHU : INK }}>{yen(r.bal)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ---------- 入出力（Excel / CSV） ----------
function IoTab({ accounts, accMap, entries, onReplace, onAddMany }) {
  const fileRef = useRef(null);
  const [msg, setMsg] = useState("");
  const [preview, setPreview] = useState(null); // インポート確認用
  const [mode, setMode] = useState("append"); // append | replace

  const nameToId = useMemo(() => {
    const m = {};
    for (const a of accounts) m[a.name] = a.id;
    return m;
  }, [accounts]);

  // 仕訳を表形式の行に変換
  const toRows = () =>
    [...entries]
      .sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0))
      .map((e) => ({
        日付: e.date,
        借方科目: accMap[e.debit]?.name ?? e.debit,
        貸方科目: accMap[e.credit]?.name ?? e.credit,
        金額: e.amount,
        摘要: e.memo || "",
      }));

  const exportExcel = () => {
    const ws = XLSX.utils.json_to_sheet(toRows());
    ws["!cols"] = [{ wch: 12 }, { wch: 20 }, { wch: 20 }, { wch: 12 }, { wch: 30 }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "仕訳");
    XLSX.writeFile(wb, `KakeiLedgr_仕訳_${today()}.xlsx`);
    setMsg(`${entries.length}件をExcelで書き出しました`);
  };

  const exportCSV = () => {
    const ws = XLSX.utils.json_to_sheet(toRows());
    const csv = XLSX.utils.sheet_to_csv(ws);
    // BOM付きでExcelの文字化けを防ぐ
    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `KakeiLedgr_仕訳_${today()}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    setMsg(`${entries.length}件をCSVで書き出しました`);
  };

  const handleFile = async (file) => {
    if (!file) return;
    setMsg(""); setPreview(null);
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: "array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
      const parsed = [];
      const errors = [];
      rows.forEach((r, i) => {
        // 列名は日本語・英語どちらでも拾えるように
        const date = String(r["日付"] ?? r["date"] ?? "").trim();
        const debitName = String(r["借方科目"] ?? r["借方"] ?? r["debit"] ?? "").trim();
        const creditName = String(r["貸方科目"] ?? r["貸方"] ?? r["credit"] ?? "").trim();
        const amount = Number(r["金額"] ?? r["amount"] ?? 0);
        const memo = String(r["摘要"] ?? r["memo"] ?? "").trim();
        const rowNo = i + 2; // ヘッダー込みの行番号
        if (!date && !debitName && !creditName && !amount) return; // 空行スキップ
        const debit = nameToId[debitName];
        const credit = nameToId[creditName];
        if (!date) { errors.push(`${rowNo}行目: 日付がありません`); return; }
        if (!debit) { errors.push(`${rowNo}行目: 借方科目「${debitName}」が見つかりません`); return; }
        if (!credit) { errors.push(`${rowNo}行目: 貸方科目「${creditName}」が見つかりません`); return; }
        if (!amount || amount <= 0) { errors.push(`${rowNo}行目: 金額が不正です`); return; }
        // 日付の正規化（Excelシリアル値やDate型に対応）
        let d = date;
        if (typeof r["日付"] === "number") {
          const dt = XLSX.SSF ? XLSX.SSF.parse_date_code(r["日付"]) : null;
          if (dt) d = `${dt.y}-${String(dt.m).padStart(2, "0")}-${String(dt.d).padStart(2, "0")}`;
        } else {
          d = date.replaceAll("/", "-").slice(0, 10);
        }
        parsed.push({ id: uid(), date: d, debit, credit, amount: Math.round(amount), memo });
      });
      setPreview({ parsed, errors });
      if (parsed.length === 0 && errors.length === 0) setMsg("読み込める仕訳がありませんでした");
    } catch (e) {
      setMsg("ファイルの読み込みに失敗しました。Excel(.xlsx)またはCSV形式か確認してください。");
    }
  };

  const confirmImport = () => {
    if (!preview) return;
    if (mode === "replace") onReplace(preview.parsed);
    else onAddMany(preview.parsed);
    setMsg(`${preview.parsed.length}件を${mode === "replace" ? "置き換え" : "追加"}インポートしました`);
    setPreview(null);
    if (fileRef.current) fileRef.current.value = "";
  };

  return (
    <div className="space-y-6">
      {/* エクスポート */}
      <section className="bg-white border rounded-lg p-4" style={{ borderColor: RULE }}>
        <h2 className="text-sm mb-1" style={{ fontFamily: MINCHO, fontWeight: 600 }}>書き出し（エクスポート）</h2>
        <p className="text-xs mb-3" style={{ color: MUTE }}>
          全{entries.length}件の仕訳を、日付・借方科目・貸方科目・金額・摘要の表形式で書き出します。ExcelやGoogleスプレッドシートで開けます。
        </p>
        <div className="flex gap-2">
          <button onClick={exportExcel} disabled={entries.length === 0}
            className="px-4 py-2 rounded text-white text-sm" style={{ background: INK, opacity: entries.length === 0 ? 0.4 : 1 }}>
            Excelで書き出し
          </button>
          <button onClick={exportCSV} disabled={entries.length === 0}
            className="px-4 py-2 rounded border text-sm" style={{ borderColor: INK, color: INK, opacity: entries.length === 0 ? 0.4 : 1 }}>
            CSVで書き出し
          </button>
        </div>
      </section>

      {/* インポート */}
      <section className="bg-white border rounded-lg p-4" style={{ borderColor: RULE }}>
        <h2 className="text-sm mb-1" style={{ fontFamily: MINCHO, fontWeight: 600 }}>読み込み（インポート）</h2>
        <p className="text-xs mb-3" style={{ color: MUTE }}>
          同じ表形式のExcel/CSVを読み込めます。科目名は現在登録されている勘定科目名と一致している必要があります（先に科目タブで登録してください）。
        </p>

        <div className="flex gap-3 mb-3 text-sm">
          <label className="flex items-center gap-1.5" style={{ color: MUTE }}>
            <input type="radio" checked={mode === "append"} onChange={() => setMode("append")} />
            既存に追加
          </label>
          <label className="flex items-center gap-1.5" style={{ color: MUTE }}>
            <input type="radio" checked={mode === "replace"} onChange={() => setMode("replace")} />
            すべて置き換え
          </label>
        </div>

        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv"
          onChange={(ev) => handleFile(ev.target.files[0])}
          className="text-sm" style={{ color: MUTE }} />

        {preview && (
          <div className="mt-4 border rounded p-3" style={{ borderColor: SHU, background: "#FDF6F5" }}>
            <p className="text-sm font-semibold" style={{ fontFamily: MINCHO }}>
              読み込みプレビュー：{preview.parsed.length}件
            </p>
            {preview.errors.length > 0 && (
              <div className="mt-2">
                <p className="text-xs" style={{ color: SHU }}>{preview.errors.length}件の行に問題があります（スキップされます）:</p>
                <ul className="text-xs mt-1 max-h-32 overflow-auto" style={{ color: SHU }}>
                  {preview.errors.slice(0, 20).map((e, i) => <li key={i}>・{e}</li>)}
                  {preview.errors.length > 20 && <li>…ほか{preview.errors.length - 20}件</li>}
                </ul>
              </div>
            )}
            {preview.parsed.length > 0 && (
              <div className="mt-2 max-h-40 overflow-auto bg-white rounded border" style={{ borderColor: RULE }}>
                <table className="w-full text-xs">
                  <tbody>
                    {preview.parsed.slice(0, 10).map((e) => (
                      <tr key={e.id} className="border-b" style={{ borderColor: RULE }}>
                        <td className="px-2 py-1" style={{ color: MUTE }}>{e.date}</td>
                        <td className="px-2 py-1" style={{ color: INK }}>{accMap[e.debit]?.name}</td>
                        <td className="px-2 py-1" style={{ color: SHU }}>{accMap[e.credit]?.name}</td>
                        <td className="px-2 py-1 text-right" style={{ fontFamily: MINCHO }}>{yen(e.amount)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                {preview.parsed.length > 10 && (
                  <p className="text-xs px-2 py-1" style={{ color: MUTE }}>…ほか{preview.parsed.length - 10}件</p>
                )}
              </div>
            )}
            <div className="flex gap-2 mt-3">
              <button onClick={confirmImport} disabled={preview.parsed.length === 0}
                className="px-4 py-1.5 rounded text-white text-sm"
                style={{ background: INK, opacity: preview.parsed.length === 0 ? 0.4 : 1 }}>
                {mode === "replace" ? "置き換えて取り込む" : "追加で取り込む"}
              </button>
              <button onClick={() => { setPreview(null); if (fileRef.current) fileRef.current.value = ""; }}
                className="px-3 py-1.5 text-sm" style={{ color: MUTE }}>
                取り消す
              </button>
            </div>
            {mode === "replace" && (
              <p className="text-xs mt-2" style={{ color: SHU }}>
                ※「置き換え」は現在の全仕訳を削除して入れ替えます。先にバックアップとして書き出しておくことをおすすめします。
              </p>
            )}
          </div>
        )}

        {msg && <p className="text-xs mt-3" style={{ color: INK }}>{msg}</p>}
      </section>

      {/* 形式の説明 */}
      <section className="bg-white border rounded-lg p-4" style={{ borderColor: RULE }}>
        <h2 className="text-sm mb-2" style={{ fontFamily: MINCHO, fontWeight: 600 }}>ファイル形式</h2>
        <div className="overflow-auto">
          <table className="text-xs border" style={{ borderColor: RULE }}>
            <thead>
              <tr style={{ background: PAPER }}>
                {["日付", "借方科目", "貸方科目", "金額", "摘要"].map((h) => (
                  <th key={h} className="px-2 py-1 border font-normal" style={{ borderColor: RULE, color: MUTE }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              <tr>
                <td className="px-2 py-1 border" style={{ borderColor: RULE }}>2026-06-13</td>
                <td className="px-2 py-1 border" style={{ borderColor: RULE }}>食費</td>
                <td className="px-2 py-1 border" style={{ borderColor: RULE }}>現金</td>
                <td className="px-2 py-1 border text-right" style={{ borderColor: RULE }}>1200</td>
                <td className="px-2 py-1 border" style={{ borderColor: RULE }}>スーパー</td>
              </tr>
            </tbody>
          </table>
        </div>
        <p className="text-xs mt-2" style={{ color: MUTE }}>
          日付はYYYY-MM-DD形式（またはYYYY/MM/DD）。借方・貸方は科目名で記入します。一度書き出したファイルを編集して読み込み直すのが確実です。
        </p>
      </section>
    </div>
  );
}

// ---------- 科目管理 ----------
function AccountsTab({ accounts, setAccounts, entries, onSnapshot }) {
  const [name, setName] = useState("");
  const [type, setType] = useState("expense");
  const [market, setMarket] = useState(false);
  const [asCard, setAsCard] = useState(false);
  const [msg, setMsg] = useState("");
  const [editing, setEditing] = useState(null);
  const [editName, setEditName] = useState("");
  const [dragId, setDragId] = useState(null);
  const rowRefs = useRef({});       // id -> li要素
  const dragInfo = useRef(null);    // { id, type }
  const snap = (label) => onSnapshot && onSnapshot(label);

  const add = () => {
    const n = name.trim();
    if (!n) return setMsg("科目名を入力してください");
    if (accounts.some((a) => a.name === n)) return setMsg("同じ名前の科目があります");
    const extra = type === "asset" && market ? { market: true }
      : type === "liability" && asCard ? { card: true, payMonth: 1, payDay: 27 }
      : {};
    snap("科目の追加");
    setAccounts((p) => [...p, { id: uid(), name: n, type, ...extra }]);
    setName(""); setMarket(false); setAsCard(false);
    setMsg(type === "liability" && asCard ? "カードを追加しました（カードタブで支払日を設定できます）" : "科目を追加しました");
  };

  const remove = (a) => {
    if (a.protected) return setMsg(`「${a.name}」は立替管理で使うため削除できません`);
    if (entries.some((e) => e.debit === a.id || e.credit === a.id))
      return setMsg(`「${a.name}」は仕訳で使われているため削除できません`);
    snap("科目の削除");
    setAccounts((p) => p.filter((x) => x.id !== a.id));
    setMsg(`「${a.name}」を削除しました`);
  };

  const rename = (a) => {
    const n = editName.trim();
    if (!n) return;
    snap("科目名の変更");
    setAccounts((p) => p.map((x) => (x.id === a.id ? { ...x, name: n } : x)));
    setEditing(null);
    setMsg("名前を変更しました");
  };

  const toggleMarket = (a) => {
    snap("時価設定の変更");
    setAccounts((p) => p.map((x) => (x.id === a.id ? { ...x, market: !x.market } : x)));
  };

  // 指/カーソルの Y 座標から、同じ区分内で挿入すべき位置の科目IDを返す
  const findTargetId = (type, clientY) => {
    const sameType = accounts.filter((a) => a.type === type);
    for (const a of sameType) {
      const el = rowRefs.current[a.id];
      if (!el) continue;
      const r = el.getBoundingClientRect();
      // 行の中央より上に指があれば、その行の手前へ挿入
      if (clientY < r.top + r.height / 2) return a.id;
    }
    return null; // どの行より下 → 末尾へ
  };

  // dragId を、同区分の targetId の手前（null なら末尾）へ移動
  const reorderTo = (type, targetId) => {
    const fromId = dragInfo.current?.id;
    if (!fromId) return;
    setAccounts((prev) => {
      const from = prev.find((a) => a.id === fromId);
      if (!from || from.type !== type) return prev;
      if (fromId === targetId) return prev;
      const without = prev.filter((a) => a.id !== fromId);
      if (targetId == null) {
        // 同区分の最後の科目の直後に挿入
        const lastIdx = without.map((a, i) => (a.type === type ? i : -1)).filter((i) => i >= 0).pop();
        if (lastIdx == null) without.push(from);
        else without.splice(lastIdx + 1, 0, from);
      } else {
        const at = without.findIndex((a) => a.id === targetId);
        without.splice(at < 0 ? without.length : at, 0, from);
      }
      return without;
    });
  };

  const startDrag = (a) => {
    snap("科目の並び替え");
    dragInfo.current = { id: a.id, type: a.type };
    setDragId(a.id);
    document.body.style.userSelect = "none";
  };

  const moveDrag = (clientY) => {
    if (!dragInfo.current) return;
    const { type } = dragInfo.current;
    const targetId = findTargetId(type, clientY);
    reorderTo(type, targetId);
  };

  const endDrag = () => {
    dragInfo.current = null;
    setDragId(null);
    document.body.style.userSelect = "";
  };

  // ポインタ（マウス/タッチ統合）イベントを window に張る
  useEffect(() => {
    if (!dragId) return;
    const onMove = (ev) => {
      const y = ev.touches ? ev.touches[0].clientY : ev.clientY;
      if (ev.cancelable) ev.preventDefault();
      moveDrag(y);
    };
    const onUp = () => endDrag();
    window.addEventListener("touchmove", onMove, { passive: false });
    window.addEventListener("touchend", onUp);
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => {
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend", onUp);
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
  }, [dragId, accounts]);

  return (
    <div>
      <div className="bg-white border rounded-lg p-4" style={{ borderColor: RULE }}>
        <div className="flex gap-2 flex-wrap">
          <input value={name} onChange={(ev) => setName(ev.target.value)} placeholder="新しい科目名"
            className="flex-1 border rounded px-2 py-2 text-sm min-w-32" style={{ borderColor: RULE }} />
          <select value={type} onChange={(ev) => setType(ev.target.value)}
            className="border rounded px-2 py-2 text-sm bg-white" style={{ borderColor: RULE }}>
            {CATEGORIES.map((c) => <option key={c.key} value={c.key}>{c.label}</option>)}
          </select>
          <button onClick={add} className="px-4 py-2 rounded text-white text-sm" style={{ background: INK }}>
            追加する
          </button>
        </div>
        {type === "asset" && (
          <label className="flex items-center gap-2 text-xs mt-2" style={{ color: MUTE }}>
            <input type="checkbox" checked={market} onChange={(ev) => setMarket(ev.target.checked)} />
            時価評価する資産（株式・投信・ポイント運用など。資産タブで評価額を更新できます）
          </label>
        )}
        {type === "liability" && (
          <label className="flex items-center gap-2 text-xs mt-2" style={{ color: MUTE }}>
            <input type="checkbox" checked={asCard} onChange={(ev) => setAsCard(ev.target.checked)} />
            クレジットカードとして扱う（カードタブで支払日・利用明細を管理できます）
          </label>
        )}
        {msg && <p className="text-xs mt-2" style={{ color: MUTE }}>{msg}</p>}
      </div>

      <div className="mt-5 space-y-4">
        <p className="text-xs" style={{ color: MUTE }}>
          ⠿ を押したまま上下に動かすと、同じ区分内で並び替えできます。指を離した位置に確定します。
        </p>
        {CATEGORIES.map((c) => (
          <div key={c.key}>
            <h3 className="text-xs mb-1.5" style={{ color: MUTE, fontFamily: MINCHO }}>
              {c.label}（{c.normal === "debit" ? "借方残高" : "貸方残高"}が通常）
            </h3>
            <ul className="bg-white border rounded-lg divide-y" style={{ borderColor: RULE }}>
              {accounts.filter((a) => a.type === c.key).map((a) => (
                <li key={a.id}
                  ref={(el) => { if (el) rowRefs.current[a.id] = el; else delete rowRefs.current[a.id]; }}
                  className="px-3 py-2.5 flex items-center gap-2 text-sm transition-colors"
                  style={{
                    borderColor: RULE,
                    background: dragId === a.id ? "#EFEDE4" : "transparent",
                    boxShadow: dragId === a.id ? `inset 3px 0 0 ${SHU}` : undefined,
                  }}>
                  {editing === a.id ? (
                    <>
                      <input value={editName} onChange={(ev) => setEditName(ev.target.value)}
                        className="flex-1 border rounded px-2 py-1 text-sm" style={{ borderColor: RULE }} />
                      <button onClick={() => rename(a)} className="text-xs px-2 py-1 rounded text-white" style={{ background: INK }}>保存</button>
                      <button onClick={() => setEditing(null)} className="text-xs" style={{ color: MUTE }}>取消</button>
                    </>
                  ) : (
                    <>
                      <span
                        onMouseDown={() => startDrag(a)}
                        onTouchStart={() => startDrag(a)}
                        className="select-none px-2 -ml-1 py-1 text-lg leading-none touch-none"
                        style={{ color: dragId === a.id ? SHU : MUTE, cursor: "grab" }}
                        aria-label={`${a.name}をドラッグして並び替え`}>⠿</span>
                      <span className="flex-1">
                        {a.name}
                        {a.market && <span className="text-xs ml-1.5 px-1.5 py-0.5 rounded" style={{ color: SHU, background: "#FDF6F5" }}>時価</span>}
                        {a.card && <span className="text-xs ml-1.5 px-1.5 py-0.5 rounded" style={{ color: INK, background: PAPER }}>カード</span>}
                        {a.protected && <span className="text-xs ml-1.5" style={{ color: MUTE }}>固定</span>}
                      </span>
                      {a.type === "asset" && !a.protected && (
                        <button onClick={() => toggleMarket(a)} className="text-xs" style={{ color: MUTE }}>
                          {a.market ? "時価解除" : "時価にする"}
                        </button>
                      )}
                      <button onClick={() => { setEditing(a.id); setEditName(a.name); }}
                        className="text-xs" style={{ color: MUTE }}>名称変更</button>
                      <button onClick={() => remove(a)} className="text-xs" style={{ color: MUTE }}
                        aria-label={`${a.name}を削除`}>削除</button>
                    </>
                  )}
                </li>
              ))}
            </ul>
          </div>
        ))}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Kakeibo />);

</script>
</body>
